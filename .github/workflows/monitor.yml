name: NTRIP base-station monitor

# Runs around the clock over every mount in mounts.txt. NOTE: GitHub's scheduler
# granularity is ~5 minutes and best-effort (runs are often delayed under load),
# so this is "roughly every 5 min", not a guaranteed 1-minute heartbeat.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (00/06/12/18 UTC); the cron-job.org
                            # trigger is gated to the same cadence
  workflow_dispatch:
    inputs:
      only_account:
        description: "Probe only this NetworkVRS account (blank = all mounts)"
        required: false
        default: ""

concurrency:
  group: ntrip-monitor
  cancel-in-progress: false

permissions:
  contents: write            # to commit per-mount state on a status change

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      NTRIP_IP: "61.247.224.198"
      NTRIP_PORT: "2103"
      NTRIP_USER: ${{ secrets.NTRIP_USER }}
      NTRIP_PASS: ${{ secrets.NTRIP_PASS }}
      # NetworkVRS per-credential probing: all account logins, plus the CORS
      # Credentials sheet (read-only) to probe ONLY accounts currently AVAILABLE.
      NETWORKVRS_ACCOUNTS: ${{ secrets.NETWORKVRS_ACCOUNTS }}
      CORS_CREDS_URL: ${{ secrets.CORS_CREDS_URL }}
      CORS_CREDS_SECRET: ${{ secrets.CORS_CREDS_SECRET }}
      NTRIP_TIMEOUT: "12"
      ONLY_ACCOUNT: ${{ github.event.inputs.only_account }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_FROM: "LEPTON Base Monitor <onboarding@resend.dev>"
      ALERT_TO: "deependra.yadav@leptonsoftware.com"
      APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
      APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install RTCM decoder
        run: python3 -m pip install --quiet pyrtcm

      - name: Probe all mounts & alert on change
        run: |
          chmod +x check_ntrip.sh run_monitor.sh
          ./run_monitor.sh

      - name: Persist state changes
        run: |
          if [ -n "$(git status --porcelain state)" ]; then
            git config user.name  "ntrip-monitor[bot]"
            git config user.email "ntrip-monitor@users.noreply.github.com"
            git add state
            git commit -m "state update @ $(date -u '+%Y-%m-%d %H:%M:%S UTC') [skip ci]" || true
            git push || echo "::warning::state push failed (non-fatal)"
          else
            echo "No state changes to commit."
          fi
