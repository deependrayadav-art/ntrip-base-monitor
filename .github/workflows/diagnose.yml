name: NTRIP diagnose (data points)

# One-off / on-demand: pulls the caster SOURCETABLE entry for the mount and
# decodes a short RTCM sample to show exactly which data points are available.
on:
  workflow_dispatch: {}

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      NTRIP_IP: "61.247.224.198"
      NTRIP_PORT: "2103"
      NTRIP_MOUNT: "LEPTON_BASE_BHATINDA"
      NTRIP_USER: "Deependra"
      NTRIP_PASS: ${{ secrets.NTRIP_PASS }}
      SAMPLE_SECS: "20"
    steps:
      - name: Fetch SOURCETABLE entry
        run: |
          echo "===== SOURCETABLE row for $NTRIP_MOUNT ====="
          curl -s --http0.9 --max-time 15 \
            -H "Ntrip-Version: Ntrip/2.0" -A "ntrip-diagnose/1.0" \
            "http://$NTRIP_IP:$NTRIP_PORT/" -o sourcetable.txt || true
          echo "--- raw STR line(s) ---"
          grep -a "STR;$NTRIP_MOUNT" sourcetable.txt || echo "(mount not listed in sourcetable)"
          echo
          echo "--- CAS/NET header rows ---"
          grep -aE '^(CAS|NET);' sourcetable.txt | head -5 || true

      - name: Capture RTCM sample
        run: |
          echo "Capturing ${SAMPLE_SECS}s of RTCM from $NTRIP_MOUNT ..."
          curl -s --http0.9 --max-time "$SAMPLE_SECS" \
            -H "Ntrip-Version: Ntrip/2.0" -A "ntrip-diagnose/1.0" \
            -u "$NTRIP_USER:$NTRIP_PASS" \
            "http://$NTRIP_IP:$NTRIP_PORT/$NTRIP_MOUNT" -o stream.bin || true
          ls -l stream.bin
          echo "Bytes: $(wc -c < stream.bin)  => ~$(( $(wc -c < stream.bin) / SAMPLE_SECS )) B/s"

      - name: Decode RTCM messages
        run: |
          python3 -m pip install --quiet pyrtcm
          python3 - "$SAMPLE_SECS" <<'PY'
          import sys, math
          from collections import Counter
          from pyrtcm import RTCMReader

          secs = int(sys.argv[1])
          data = open("stream.bin","rb").read()
          print(f"\n===== RTCM DECODE ({len(data)} bytes, ~{secs}s) =====")

          MSM = {  # message-type prefix -> constellation
            107:"GPS",108:"GLONASS",109:"Galileo",110:"SBAS",111:"QZSS",112:"BeiDou",113:"NavIC"}
          NAMES = {
            "1004":"GPS L1/L2 obs (legacy)","1005":"Stationary ARP (no height)",
            "1006":"Stationary ARP + antenna height","1007":"Antenna descriptor",
            "1008":"Antenna descriptor+serial","1012":"GLONASS L1/L2 obs (legacy)",
            "1019":"GPS ephemeris","1020":"GLONASS ephemeris","1033":"Receiver & antenna descriptors",
            "1042":"BeiDou ephemeris","1044":"QZSS ephemeris","1045":"Galileo F/NAV eph",
            "1046":"Galileo I/NAV eph","1230":"GLONASS code-phase biases"}

          counts = Counter()
          sats = {}   # identity -> satellite count (popcount of DF394)
          coords = {}; antenna = {}; receiver = {}
          rdr = RTCMReader(__import__("io").BytesIO(data))
          n = 0
          for (_raw, msg) in rdr:
              if msg is None: continue
              ident = msg.identity
              counts[ident] += 1; n += 1
              try:
                  pre = int(ident[:3])
                  if pre in MSM and hasattr(msg,"DF394"):
                      sats[ident] = bin(int(msg.DF394)).count("1")
              except Exception: pass
              if ident in ("1005","1006"):
                  try:
                      X,Y,Z = float(msg.DF025), float(msg.DF026), float(msg.DF027)
                      # ECEF (mm units in RTCM -> already metres in pyrtcm) -> WGS84 lat/lon/h
                      a=6378137.0; f=1/298.257223563; b=a*(1-f); e2=f*(2-f)
                      p=math.hypot(X,Y); lon=math.atan2(Y,X)
                      lat=math.atan2(Z,p*(1-e2))
                      for _ in range(5):
                          N=a/math.sqrt(1-e2*math.sin(lat)**2)
                          h=p/math.cos(lat)-N
                          lat=math.atan2(Z,p*(1-e2*N/(N+h)))
                      coords[ident]=(math.degrees(lat),math.degrees(lon),h)
                  except Exception as e: coords[ident]=("err",str(e),"")
                  if ident=="1006" and hasattr(msg,"DF031"):
                      antenna["height_m"]=getattr(msg,"DF028",getattr(msg,"AntennaHeight","?"))
              if ident in ("1007","1008","1033"):
                  for fld in ("DF030","AntennaDescriptor"):
                      if hasattr(msg,fld): antenna["model"]=getattr(msg,fld)
                  for fld in ("DF228","ReceiverType"):
                      if hasattr(msg,fld): receiver["model"]=getattr(msg,fld)

          print(f"\nDecoded {n} messages, {len(counts)} distinct types.\n")
          print(f"{'MsgType':<8}{'Count':>6}  {'~Hz':>5}  Description")
          for ident,c in sorted(counts.items()):
              hz = c/secs
              extra = NAMES.get(ident,"")
              try:
                  pre=int(ident[:3])
                  if pre in MSM: extra=f"{MSM[pre]} MSM observations"
              except Exception: pass
              s = f"  sats={sats[ident]}" if ident in sats else ""
              print(f"{ident:<8}{c:>6}  {hz:>5.1f}  {extra}{s}")

          print("\n--- Derived data points ---")
          if coords:
              for k,(la,lo,h) in coords.items():
                  print(f"Base position ({k}): lat={la:.7f}  lon={lo:.7f}  h={h:.2f} m" if isinstance(la,float) else f"Base position ({k}): {la} {lo}")
          if antenna: print("Antenna:", antenna)
          if receiver: print("Receiver:", receiver)
          if sats:
              total=sum(sats.values())
              print("Satellites by constellation:",
                    {int(k[:3]):v for k,v in sats.items()}, f"(snapshot total ~{total})")
          print("\nThroughput: ~%d B/s (%.1f kbit/s)" % (len(data)//secs, len(data)*8/secs/1000))
          PY
