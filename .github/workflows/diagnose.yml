name: NTRIP diagnose (data points)

# On-demand: lists the full caster mount inventory, then for each requested
# mount resolves the exact (case-sensitive) name, captures a short RTCM sample
# and decodes the available data points.
on:
  workflow_dispatch:
    inputs:
      mounts:
        description: "Comma-separated mount names (or city keywords) to decode"
        default: "LEPTON_BASE_BHATINDA,ludhiana,amritsar"
        required: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      NTRIP_IP: "61.247.224.198"
      NTRIP_PORT: "2103"
      NTRIP_USER: "Deependra"
      NTRIP_PASS: ${{ secrets.NTRIP_PASS }}
      SAMPLE_SECS: "15"
      REQUESTED: ${{ github.event.inputs.mounts }}
    steps:
      - uses: actions/checkout@v4

      - name: Full mount inventory (SOURCETABLE)
        run: |
          curl -s --http0.9 --max-time 15 -H "Ntrip-Version: Ntrip/2.0" \
            -A "ntrip-diagnose/1.0" "http://$NTRIP_IP:$NTRIP_PORT/" -o sourcetable.txt || true
          echo "===== ALL MOUNTS ON CASTER ====="
          echo "mount | format | carrier | nav | solution | nmea | auth | bitrate"
          awk -F';' '/^STR;/ {print $2" | "$4" | "$6" | "$7" | sol="$13" | nmea="$12" | auth="$16" | "$18}' sourcetable.txt
          echo "================================"

      - name: Decode each requested mount
        run: |
          python3 -m pip install --quiet pyrtcm
          IFS=',' read -ra WANT <<< "$REQUESTED"
          for token in "${WANT[@]}"; do
            token="$(echo "$token" | xargs)"   # trim
            # Resolve exact, case-sensitive mount name from the sourcetable.
            REAL="$(awk -F';' '/^STR;/{print $2}' sourcetable.txt | grep -ixF "$token" \
                    || awk -F';' '/^STR;/{print $2}' sourcetable.txt | grep -i "$token" | head -1)"
            REAL="${REAL:-$token}"
            echo; echo "########## $token  ->  resolved mount: $REAL ##########"
            : > stream.bin   # clear prior capture so a failed fetch cannot reuse stale data
            curl -s --http0.9 --max-time "$SAMPLE_SECS" -H "Ntrip-Version: Ntrip/2.0" \
              -A "ntrip-diagnose/1.0" -u "$NTRIP_USER:$NTRIP_PASS" \
              "http://$NTRIP_IP:$NTRIP_PORT/$REAL" -o stream.bin || true
            echo "captured $(wc -c < stream.bin) bytes"
            python3 decode_rtcm.py "$SAMPLE_SECS" "$REAL" || true
          done
